    <line x1="0" y1="0" x2="0" y2="-220" stroke="#e8e8e8" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="129.3" y2="-177.9" stroke="#e8e8e8" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="209.2" y2="-68.0" stroke="#e8e8e8" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="209.2" y2="68.0" stroke="#e8e8e8" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="129.3" y2="177.9" stroke="#e8e8e8" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="0" y2="220" stroke="#e8e8e8" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="-129.3" y2="177.9" stroke="#e8e8e8" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="-209.2" y2="68.0" stroke="#e8e8e8" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="-209.2" y2="-68.0" stroke="#e8e8e8" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="-129.3" y2="-177.9" stroke="#e8e8e8" stroke-width="0.5"/>

    <!-- Previous assessment (March 30) — faded -->
    <polygon points="
      0.0,-154.0
      97.0,-133.5
      150.6,-48.9
      167.4,54.4
      97.0,133.5
      0.0,180.4
      -116.4,160.2
      -146.5,47.6
      -150.6,-48.9
      -93.1,-128.1
    " fill="none" stroke="#ccc" stroke-width="1" stroke-dasharray="4,4"/>

