    <!-- Perception=75, Generation=82, Attention=72, Learning=85, Memory=88, Reasoning=85, Metacognition=95, Executive=75, ProbSolve=75, Social=82 -->
    <!-- radius = score/100 * 220 -->
    <!-- P1 Perception 75%: r=165.0, a=0: x=0.0, y=-165.0 -->
    <!-- P2 Generation 82%: r=180.4, a=36: x=106.1, y=-145.9 -->
    <!-- P3 Attention 72%: r=158.4, a=72: x=150.6, y=-48.9 -->
    <!-- P4 Learning 85%: r=187.0, a=108: x=177.9, y=57.8 -->
    <!-- P5 Memory 88%: r=193.6, a=144: x=113.8, y=156.6 -->
    <!-- P6 Reasoning 85%: r=187.0, a=180: x=0.0, y=187.0 -->
    <!-- P7 Metacognition 95%: r=209.0, a=216: x=-122.9, y=169.1 -->
    <!-- P8 Executive 75%: r=165.0, a=252: x=-156.9, y=51.0 -->
    <!-- P9 ProbSolve 75%: r=165.0, a=288: x=-156.9, y=-51.0 -->
    <!-- P10 Social 82%: r=180.4, a=324: x=-106.1, y=-145.9 -->

