      0.0,-165.0
      106.1,-145.9
      150.6,-48.9
      177.9,57.8
      113.8,156.6
      0.0,187.0
      -122.9,169.1
      -156.9,51.0
      -156.9,-51.0
      -106.1,-145.9
    " fill="rgba(45,90,160,0.2)" stroke="#2d5aa0" stroke-width="2.5"/>

