    <text x="148" y="204" text-anchor="start" font-size="11" font-weight="600" fill="#1a7a3a">Processing</text>
    <text x="148" y="218" text-anchor="start" font-size="9" fill="#1a7a3a">Strong 82% — replay, mutation, idle dreams</text>

