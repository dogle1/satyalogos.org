    <circle cx="207.8" cy="-67.5" r="5" fill="#1a7a3a"/>
    <circle cx="201.2" cy="65.4" r="5" fill="#1a7a3a"/>
    <circle cx="110.9" cy="152.6" r="5" fill="#1a7a3a"/>
